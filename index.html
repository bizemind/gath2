<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Fold & Form | Creatis</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#1a1714;
  --parchment:#f7f3ec;
  --warm:#ede7db;
  --accent:#7c3e2b;
  --accent2:#c4613e;
  --accent-pale:#f5ebe5;
  --border:#d8cfc3;
  --muted:#8a7f74;
  --faint:#c4b9ae;
  --surface:#fdfaf6;
  --r:10px;
}

html{-webkit-text-size-adjust:100%}
body{
  font-family:'DM Mono',monospace;
  background:var(--parchment);
  color:var(--ink);
  min-height:100vh;
  line-height:1.65;
  background-image:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c4b9ae' fill-opacity='0.13'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
}
.app{max-width:600px;margin:0 auto;padding:2rem 1rem 4rem}

/* Header */
.site-header{text-align:center;margin-bottom:2.5rem;padding-bottom:1.5rem;border-bottom:1px solid var(--border)}
.site-header .eyebrow{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.18em;color:var(--muted);text-transform:uppercase;margin-bottom:.5rem}
.site-header h1{font-family:'Cormorant Garamond',Georgia,serif;font-size:clamp(32px,8vw,48px);font-weight:300;letter-spacing:-.5px;line-height:1.1}
.site-header h1 em{font-style:italic;color:var(--accent2)}
.site-header .sub{font-family:'Cormorant Garamond',Georgia,serif;font-size:15px;color:var(--muted);margin-top:.6rem;font-weight:300}

/* Nav pills */
.nav{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-bottom:2rem}
.nav-pill{
  font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;
  padding:7px 14px;border-radius:99px;border:1px solid var(--border);
  background:transparent;color:var(--muted);cursor:pointer;
  transition:all .18s;-webkit-tap-highlight-color:transparent;
}
.nav-pill:hover{border-color:var(--accent);color:var(--accent)}
.nav-pill.active{background:var(--ink);color:var(--parchment);border-color:var(--ink)}

/* Category card */
.cat-card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
  overflow:hidden;display:none;
}
.cat-card.visible{display:block;animation:fadeUp .35s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* Category hero */
.cat-hero{
  padding:1.75rem 1.5rem 1.25rem;
  border-bottom:1px solid var(--border);
  position:relative;overflow:hidden;
}
.cat-hero::before{
  content:'';position:absolute;right:-20px;top:-20px;
  width:120px;height:120px;border-radius:50%;opacity:.08;
}
.cat-hero.pleating::before{background:radial-gradient(circle,#8a3a6b,transparent)}
.cat-hero.smocking::before{background:radial-gradient(circle,#3a6b5a,transparent)}
.cat-hero.folding::before{background:radial-gradient(circle,#2a5a8a,transparent)}
.cat-hero.slash::before{background:radial-gradient(circle,#8a5a2a,transparent)}

.cat-num{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.15em;color:var(--faint);text-transform:uppercase;margin-bottom:.4rem}
.cat-title{font-family:'Cormorant Garamond',Georgia,serif;font-size:clamp(22px,5vw,30px);font-weight:300;letter-spacing:-.3px}
.cat-title em{font-style:italic;color:var(--accent2)}
.cat-tagline{font-size:14px;color:var(--muted);margin-top:.4rem;font-family:'DM Mono',monospace;font-weight:300}

.stitch-chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:1rem}
.stitch-chip{
  font-size:11px;padding:3px 10px;border-radius:99px;
  background:var(--accent-pale);color:var(--accent);border:1px solid #dfc4a8;
  font-family:'DM Mono',monospace;
}

/* Items */
.items-list{padding:.75rem 1.5rem 1.25rem}
.item{padding:.9rem 0;border-bottom:1px solid var(--border)}
.item:last-child{border-bottom:none}
.item-header{display:flex;align-items:flex-start;gap:12px;cursor:pointer;-webkit-tap-highlight-color:transparent}

.item-num{
  width:36px;height:36px;flex-shrink:0;border-radius:8px;
  background:var(--warm);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-family:'DM Mono',monospace;font-size:11px;color:var(--accent);font-weight:400;
}
.item-title-wrap{flex:1}
.item-name{font-family:'Cormorant Garamond',Georgia,serif;font-size:17px;font-weight:400}
.item-sub{font-size:12px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:2px}
.item-toggle{font-size:18px;color:var(--faint);margin-left:auto;transition:transform .2s;flex-shrink:0;margin-top:4px}
.item-toggle.open{transform:rotate(45deg);color:var(--accent2)}

.item-body{display:none;padding-top:.85rem;padding-left:48px}
.item-body.open{display:block}

.item-diagram{
  background:var(--warm);border:1px solid var(--border);
  border-radius:8px;padding:12px;margin-bottom:.75rem;
  display:flex;align-items:center;justify-content:center;
}
.item-diagram svg{width:100%;max-width:280px;height:auto;display:block}

.item-desc{font-family:'Cormorant Garamond',Georgia,serif;font-size:15px;color:#4a4540;line-height:1.7}
.item-detail{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);margin-top:.55rem;line-height:1.65}
.item-detail strong{color:var(--accent)}

.item-difficulty{display:inline-flex;align-items:center;gap:6px;margin-top:.65rem;font-family:'DM Mono',monospace;font-size:11px;color:var(--muted)}
.diff-dot{width:7px;height:7px;border-radius:50%;background:var(--faint)}
.diff-dot.on{background:var(--accent2)}

/* Hint banner */
.cat-hint{
  margin:0 1.5rem .25rem;
  padding:.65rem .9rem;
  background:var(--warm);
  border:1px solid var(--border);
  border-radius:8px;
  font-family:'DM Mono',monospace;
  font-size:11px;
  color:var(--muted);
  line-height:1.6;
  letter-spacing:.01em;
}

/* Footer */
.footer{text-align:center;margin-top:2rem;padding-top:1.5rem;border-top:1px solid var(--border)}
.footer p{font-size:13px;color:var(--muted)}
.footer a{color:var(--accent);text-decoration:none}
.footer a:hover{text-decoration:underline}
</style>
</head>
<body>
<div class="app">

  <div class="site-header">
    <div class="eyebrow">Creatis</div>
    <h1>Fold <em>&amp; Form</em></h1>
    <div class="sub">Four techniques · endless dimension</div>
  </div>

  <div class="nav" id="nav"></div>
  <div id="content"></div>

  <div class="footer">
    <p>Built by <a href="https://creatis.in/pages/stack" target="_blank">The Creatis Stack</a></p>
  </div>

</div>

const CATS = [
  {

let activeId = "pleating";

const nav = document.getElementById("nav");
CATS.forEach(cat => {
  const btn = document.createElement("button");
  btn.className = "nav-pill" + (cat.id === activeId ? " active" : "");
  btn.textContent = cat.label;
  btn.dataset.id = cat.id;
  btn.onclick = () => {
    activeId = cat.id;
    document.querySelectorAll(".nav-pill").forEach(x => x.classList.remove("active"));
    btn.classList.add("active");
    render();
  };
  nav.appendChild(btn);
});

function difficultyHTML(level) {
  const labels = ["","beginner","intermediate","advanced"];
  const colors = ["","#5DCAA5","#7F77DD","#D85A30"];
  let dots = "";
  for (let i = 1; i <= 3; i++) {
    dots += `<span class="diff-dot${i <= level ? ' on' : ''}" style="${i<=level?'background:'+colors[level]:''}"></span>`;
  }
  return `<div class="item-difficulty">${dots}<span>${labels[level]}</span></div>`;
}

function render() {
  const container = document.getElementById("content");
  container.innerHTML = "";
  const cat = CATS.find(c => c.id === activeId);
  if (!cat) return;

  const card = document.createElement("div");
  card.className = "cat-card visible";

  const hero = document.createElement("div");
  hero.className = `cat-hero ${cat.heroClass}`;
  hero.innerHTML = `
    <div class="cat-num">${cat.num} / 04</div>
    <div class="cat-title"><em>${cat.titleEm}</em>${cat.titleRest}</div>
    <div class="cat-tagline">${cat.tagline}</div>
    <div class="stitch-chips">${cat.chips.map(k=>`<span class="stitch-chip">${k}</span>`).join("")}</div>
  `;
  card.appendChild(hero);

  if (cat.hint) {
    const hint = document.createElement("div");
    hint.className = "cat-hint";
    hint.textContent = cat.hint;
    card.appendChild(hint);
  }

  const list = document.createElement("div");
  list.className = "items-list";

  cat.stitches.forEach((s, i) => {
    const uid = `s-${cat.id}-${i}`;
    const div = document.createElement("div");
    div.className = "item";
    div.innerHTML = `
      <div class="item-header" data-uid="${uid}">
        <div class="item-num">${s.n}</div>
        <div class="item-title-wrap">
          <div class="item-name">${s.name}</div>
          <div class="item-sub">${s.sub}</div>
        </div>
        <div class="item-toggle" id="toggle-${uid}">+</div>
      </div>
      <div class="item-body" id="${uid}">
        <div class="item-diagram">${DIAG[s.diagId] || ''}</div>
        <div class="item-desc">${s.desc}</div>
        <div class="item-detail">${s.detail}</div>
        ${difficultyHTML(s.difficulty)}
      </div>
    `;
    list.appendChild(div);
  });

  card.appendChild(list);
  container.appendChild(card);

  card.querySelectorAll(".item-header").forEach(header => {
    header.addEventListener("click", () => {
      const uid = header.dataset.uid;
      const body = document.getElementById(uid);
      const toggle = document.getElementById("toggle-" + uid);
      const isOpen = body.classList.toggle("open");
      toggle.classList.toggle("open", isOpen);
      toggle.textContent = isOpen ? "−" : "+";
    });
  });
}

render();
