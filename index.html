<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Fabric Manipulation | Creatis</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#0e0c0a;
  --paper:#f0ebe2;
  --warm:#e8dfd3;
  --deep:#1c1815;
  --surface:#161310;
  --card:#1f1b17;
  --card2:#261f19;
  --gold:#c8923a;
  --gold2:#e8b46a;
  --gold-pale:#2a1f10;
  --copper:#b56b3a;
  --muted:#7a6e62;
  --faint:#4a4238;
  --border:#2e2620;
  --border2:#3d3328;
  --text:#d4c9bc;
  --text2:#a09080;
  --accent-pl:#8a3a6b;
  --accent-sm:#3a6b5a;
  --accent-fo:#2a5a8a;
  --accent-sr:#8a5a2a;
  --r:12px;
}

html{-webkit-text-size-adjust:100%}
body{
  font-family:'Space Mono',monospace;
  background:var(--surface);
  color:var(--text);
  min-height:100vh;
  line-height:1.65;
  background-image:
    repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(255,255,255,.012) 3px,rgba(255,255,255,.012) 4px),
    repeating-linear-gradient(90deg,transparent,transparent 8px,rgba(255,255,255,.008) 8px,rgba(255,255,255,.008) 9px);
}

.app{max-width:620px;margin:0 auto;padding:2.5rem 1rem 5rem}

/* Header */
.site-header{text-align:center;margin-bottom:3rem;padding-bottom:2rem;border-bottom:1px solid var(--border)}
.eyebrow{
  font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.22em;
  color:var(--gold);text-transform:uppercase;margin-bottom:.75rem;
  display:flex;align-items:center;justify-content:center;gap:12px;
}
.eyebrow::before,.eyebrow::after{content:'';flex:1;max-width:50px;height:1px;background:linear-gradient(90deg,transparent,var(--gold))}
.eyebrow::after{background:linear-gradient(90deg,var(--gold),transparent)}
.site-header h1{
  font-family:'Playfair Display',Georgia,serif;
  font-size:clamp(36px,9vw,56px);font-weight:400;letter-spacing:-.5px;line-height:1.05;
  color:var(--paper);
}
.site-header h1 em{font-style:italic;color:var(--gold)}
.site-header .sub{
  font-size:11px;color:var(--text2);margin-top:.85rem;
  letter-spacing:.12em;text-transform:uppercase;
}
.thread-line{
  width:100%;height:1px;margin-top:1.5rem;
  background:linear-gradient(90deg,transparent,var(--gold),var(--copper),var(--gold),transparent);
  opacity:.35;
}

/* Nav */
.nav{display:flex;flex-direction:column;gap:8px;margin-bottom:2rem}
.nav-item{
  display:flex;align-items:center;gap:14px;
  padding:14px 18px;border-radius:var(--r);
  border:1px solid var(--border);background:var(--card);
  cursor:pointer;-webkit-tap-highlight-color:transparent;
  transition:all .2s;
}
.nav-item:hover{border-color:var(--border2);background:var(--card2)}
.nav-item.active{border-color:var(--gold);background:var(--gold-pale)}
.nav-item-num{
  font-size:10px;letter-spacing:.1em;color:var(--faint);
  width:22px;flex-shrink:0;
}
.nav-item.active .nav-item-num{color:var(--gold)}
.nav-item-name{
  font-family:'Playfair Display',serif;font-size:16px;font-weight:400;
  color:var(--text);flex:1;
}
.nav-item.active .nav-item-name{color:var(--paper)}
.nav-item-tag{font-size:9px;color:var(--faint);letter-spacing:.08em}
.nav-item.active .nav-item-tag{color:var(--gold)}
.nav-swatch{width:6px;height:28px;border-radius:3px;flex-shrink:0}

/* Content card */
.cat-card{display:none;animation:fadeUp .35s ease both}
.cat-card.visible{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* Hero */
.cat-hero{
  padding:2rem 1.5rem 1.5rem;
  border:1px solid var(--border);border-radius:var(--r) var(--r) 0 0;
  position:relative;overflow:hidden;
  background:var(--card);
}
.cat-hero::after{
  content:'';position:absolute;top:0;left:0;right:0;bottom:0;
  background:radial-gradient(ellipse at 80% 20%,var(--hero-glow,rgba(200,146,58,.06)) 0%,transparent 65%);
  pointer-events:none;
}
.cat-num{
  font-size:10px;letter-spacing:.18em;color:var(--faint);
  text-transform:uppercase;margin-bottom:.5rem;
}
.cat-title{
  font-family:'Playfair Display',serif;
  font-size:clamp(28px,6vw,40px);font-weight:400;letter-spacing:-.3px;
  color:var(--paper);line-height:1.1;
}
.cat-title em{font-style:italic;color:var(--gold2)}
.cat-tagline{font-size:10px;color:var(--text2);margin-top:.5rem;letter-spacing:.1em;text-transform:uppercase}
.cat-chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:1.1rem}
.cat-chip{
  font-size:9px;padding:4px 10px;border-radius:99px;
  background:var(--gold-pale);color:var(--gold);
  border:1px solid rgba(200,146,58,.3);letter-spacing:.05em;
}

/* Hint */
.cat-hint{
  padding:.75rem 1.25rem;
  background:var(--card2);
  border-left:3px solid var(--gold);
  border-right:1px solid var(--border);
  font-size:10px;color:var(--text2);line-height:1.7;letter-spacing:.04em;
}

/* Items */
.items-list{
  border:1px solid var(--border);border-top:none;
  border-radius:0 0 var(--r) var(--r);
  background:var(--card);
  overflow:hidden;
}
.item{border-top:1px solid var(--border)}
.item:first-child{border-top:none}
.item-header{
  display:flex;align-items:flex-start;gap:14px;
  padding:1.1rem 1.25rem;cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  transition:background .18s;
}
.item-header:hover{background:var(--card2)}
.item-num{
  width:34px;height:34px;flex-shrink:0;border-radius:7px;
  border:1px solid var(--border2);
  display:flex;align-items:center;justify-content:center;
  font-size:10px;color:var(--gold);letter-spacing:.05em;
  background:var(--gold-pale);
}
.item-title-wrap{flex:1}
.item-name{
  font-family:'Playfair Display',serif;
  font-size:18px;font-weight:400;color:var(--paper);
}
.item-sub{font-size:9px;color:var(--text2);margin-top:3px;letter-spacing:.07em;text-transform:uppercase}
.item-toggle{
  font-size:20px;color:var(--faint);margin-left:auto;
  transition:transform .25s,color .18s;flex-shrink:0;margin-top:3px;
  width:24px;text-align:center;
}
.item-toggle.open{transform:rotate(45deg);color:var(--gold)}

/* Body */
.item-body{display:none;padding:0 1.25rem 1.25rem 1.25rem;padding-left:calc(1.25rem + 34px + 14px)}
.item-body.open{display:block;animation:bodyIn .25s ease both}
@keyframes bodyIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

.item-diagram{
  background:var(--deep);border:1px solid var(--border2);
  border-radius:8px;padding:16px 12px;margin-bottom:.85rem;
  display:flex;align-items:center;justify-content:center;
}
.item-diagram svg{width:100%;max-width:300px;height:auto;display:block}

.item-desc{
  font-family:'Playfair Display',serif;
  font-size:15px;color:var(--text);line-height:1.75;font-weight:400;
}
.item-detail{font-size:10px;color:var(--text2);margin-top:.75rem;line-height:1.8;letter-spacing:.03em}
.item-detail strong{color:var(--gold);font-weight:700}

.difficulty-bar{display:flex;align-items:center;gap:8px;margin-top:.85rem}
.diff-seg{height:3px;border-radius:2px;background:var(--border2);flex:1;max-width:28px;transition:background .2s}
.diff-seg.on-1{background:#5DCAA5}
.diff-seg.on-2{background:#7F77DD}
.diff-seg.on-3{background:#D85A30}
.diff-label{font-size:9px;color:var(--faint);letter-spacing:.1em;text-transform:uppercase}

/* Footer */
.footer{text-align:center;margin-top:2.5rem;padding-top:1.5rem;border-top:1px solid var(--border)}
.footer p{font-size:10px;color:var(--faint);letter-spacing:.1em}
.footer a{color:var(--gold);text-decoration:none}
.footer a:hover{color:var(--gold2)}
</style>
</head>
<body>

    <div class="thread-line"></div>
  </div>

  <div class="nav" id="nav"></div>
  <div id="content"></div>

  <div class="footer">
    <p><a href="http://bizemind.com" target="_blank">bizemind</a> — Built by Creatis</p>
  </div>

</div>

let activeId = "pleating";

// ── Build nav ────────────────────────────────────────────────────────────────
const nav = document.getElementById("nav");
CATS.forEach(cat => {
  const div = document.createElement("div");
  div.className = "nav-item" + (cat.id === activeId ? " active" : "");
  div.dataset.id = cat.id;
  div.innerHTML = `
    <div class="nav-item-num">${cat.num}</div>
    <div style="flex:1">
      <div class="nav-item-name">${cat.label}</div>
      <div class="nav-item-tag">${cat.tagline}</div>
    </div>
    <div class="nav-swatch" style="background:${cat.accentColor};opacity:0.7"></div>
  `;
  div.onclick = () => {
    activeId = cat.id;
    document.querySelectorAll(".nav-item").forEach(x => x.classList.remove("active"));
    div.classList.add("active");
    render();
    document.getElementById("content").scrollIntoView({behavior:"smooth", block:"start"});
  };
  nav.appendChild(div);
});

// ── Difficulty ───────────────────────────────────────────────────────────────
function diffHTML(level) {
  const labels = ["","beginner","intermediate","advanced"];
  const colors = ["","#5DCAA5","#7F77DD","#D85A30"];
  let segs = "";
  for (let i = 1; i <= 3; i++) {
    segs += `<div class="diff-seg${i <= level ? ' on-'+i : ''}" style="${i<=level?'background:'+colors[level]:''}"></div>`;
  }
  return `<div class="difficulty-bar">${segs}<div class="diff-label">${labels[level]}</div></div>`;
}

// ── Render ───────────────────────────────────────────────────────────────────
function render() {
  const container = document.getElementById("content");
  container.innerHTML = "";
  const cat = CATS.find(c => c.id === activeId);
  if (!cat) return;

  const card = document.createElement("div");
  card.className = "cat-card visible";

  // Hero
  const hero = document.createElement("div");
  hero.className = "cat-hero";
  hero.style.cssText = `--hero-glow:${cat.heroGlow}`;
  hero.innerHTML = `
    <div class="cat-num">${cat.num} / 04</div>
    <div class="cat-title"><em>${cat.titleItalic}</em>${cat.titleRest}</div>
    <div class="cat-tagline">${cat.tagline}</div>
    <div class="cat-chips">${cat.chips.map(k=>`<span class="cat-chip">${k}</span>`).join("")}</div>
  `;
  card.appendChild(hero);

  // Hint
  const hint = document.createElement("div");
  hint.className = "cat-hint";
  hint.innerHTML = `⟶ &nbsp;${cat.hint}`;
  card.appendChild(hint);

  // Items
  const list = document.createElement("div");
  list.className = "items-list";

  cat.stitches.forEach((s, i) => {
    const uid = `s-${cat.id}-${i}`;
    const item = document.createElement("div");
    item.className = "item";
    item.innerHTML = `
      <div class="item-header" data-uid="${uid}">
        <div class="item-num">${s.n}</div>
        <div class="item-title-wrap">
          <div class="item-name">${s.name}</div>
          <div class="item-sub">${s.sub}</div>
        </div>
        <div class="item-toggle" id="toggle-${uid}">+</div>
      </div>
      <div class="item-body" id="${uid}">
        <div class="item-diagram">${DIAG[s.id] || ''}</div>
        <div class="item-desc">${s.desc}</div>
        <div class="item-detail">${s.detail}</div>
        ${diffHTML(s.difficulty)}
      </div>
    `;
    list.appendChild(item);
  });

  card.appendChild(list);
  container.appendChild(card);

  // Accordion
  card.querySelectorAll(".item-header").forEach(header => {
    header.addEventListener("click", () => {
      const uid = header.dataset.uid;
      const body = document.getElementById(uid);
      const toggle = document.getElementById("toggle-" + uid);
      const isOpen = body.classList.toggle("open");
      toggle.classList.toggle("open", isOpen);
      toggle.textContent = isOpen ? "−" : "+";
    });
  });
}

render();
</script>
